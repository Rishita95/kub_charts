apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hello-world
  namespace: default
spec:
  selector:
    matchLabels:
      name: hello-world
  template:
    metadata:
      labels:
        name: hello-world
    spec:
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: hello-world
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - "echo 'Hello World' && sleep infinity"
        resources:
          requests:
            cpu: "3500m"
            memory: "3500Mi"
          limits:
            cpu: "3500m"
            memory: "3500Mi"

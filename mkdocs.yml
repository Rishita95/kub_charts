site_name: Kub Charts
site_url: https://Rishita95.github.io/kub_charts
repo_url: https://github.com/Rishita95/kub_charts
repo_name: kub_charts

nav:
  - Home: index.md
  - Cluster:
      - Overview: Cluster/Overview.md
      - Prerequisites: Cluster/Prerequisites.md
      - Kind Cluster Setup: Cluster/Kind_Cluster_Setup.md
      - Hello World Deployment: Cluster/Hello_World.md

theme:
  name: material
  features:
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
